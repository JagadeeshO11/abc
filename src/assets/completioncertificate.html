<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; }
        .certificate-container { 
            border: 15px solid #1a3c5e; 
            padding: 40px; 
            width: 800px; 
            margin: auto; 
            background-color: white; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .header { font-size: 50px; color: #1a3c5e; text-transform: uppercase; margin-bottom: 20px; font-weight: bold; }
        .sub-header { font-size: 20px; color: #555; margin-bottom: 40px; font-style: italic; }
        .user-name { font-size: 40px; color: #d4af37; border-bottom: 2px solid #d4af37; display: inline-block; padding: 10px 30px; margin: 20px 0; }
        .course-text { font-size: 22px; color: #333; margin: 30px 0; }
        .footer { margin-top: 50px; display: flex; justify-content: space-between; padding: 0 50px; }
        .signature { border-top: 1px solid #333; width: 150px; padding-top: 5px; font-size: 14px; color: #666; }
        .logo { font-weight: bold; color: #1a3c5e; font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="certificate-container">
        <div class="logo">ITBEES GLOBAL</div>
        <div class="header">Certificate of Completion</div>
        <div class="sub-header">This is to certify that</div>
        <div class="user-name">{{Full_Name}}</div>
        <div class="course-text">has successfully completed the course</div>
        <div style="font-size: 28px; font-weight: bold; color: #1a3c5e;">{{Course_Name}}</div>
        <div style="margin-top: 20px; font-size: 18px; color: #777;">Awarded on: {{Date}}</div>
        
        <div class="footer">
            <div class="signature">Authorized Signature</div>
            <div class="signature">Course Instructor</div>
        </div>
    </div>
</body>
</html>
